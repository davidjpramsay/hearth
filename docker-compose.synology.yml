services:
  hearth:
    image: ${HEARTH_IMAGE:-ghcr.io/davidjpramsay/hearth:latest}
    container_name: hearth
    ports:
      - "3000:3000"
    environment:
      APP_NAME: ${APP_NAME:-Hearth}
      HOST: 0.0.0.0
      PORT: 3000
      DATA_DIR: /app/data
      TZ: ${TZ:-}
      DEFAULT_SITE_TIMEZONE: ${DEFAULT_SITE_TIMEZONE:-}
      BACKUP_DIR: /app/data/backups
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      BACKUP_INTERVAL_MINUTES: ${BACKUP_INTERVAL_MINUTES:-360}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-30}
      ESV_API_KEY: ${ESV_API_KEY:-}
      KOBO_READER_APP_DB_PATH: ${KOBO_READER_APP_DB_PATH:-/external/calibreweb/app.db}
      KOBO_READER_LIBRARY_DB_PATH: ${KOBO_READER_LIBRARY_DB_PATH:-/external/books/metadata.db}
      KOBO_READER_LIBRARY_ROOT: ${KOBO_READER_LIBRARY_ROOT:-/external/books}
    volumes:
      # Recommended Synology data path.
      - /volume1/docker/hearth/data:/app/data
      - /volume1/docker/calibreweb:/external/calibreweb:ro
      - /volume1/media/Books:/external/books:ro
    restart: unless-stopped
